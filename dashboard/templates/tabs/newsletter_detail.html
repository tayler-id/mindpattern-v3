<div>
    <div style="margin-bottom:1rem;">
        <a hx-get="/newsletters" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="/newsletters"
           style="color:#38bdf8;cursor:pointer;font-size:0.8125rem;text-decoration:none;">
            &larr; Back to Newsletters
        </a>
    </div>

    {% if newsletter_html %}
    <div class="card">
        <div class="meta" style="margin-bottom:1rem;">
            <div class="meta-item">
                <span class="meta-label">Date</span>
                <span class="meta-value">{{ newsletter_date }}</span>
            </div>
            {% if newsletter_title %}
            <div class="meta-item">
                <span class="meta-label">Title</span>
                <span class="meta-value">{{ newsletter_title }}</span>
            </div>
            {% endif %}
        </div>
    </div>

    <div class="card newsletter-content">
        <style>
            .newsletter-content h1 {
                color: #f1f5f9;
                font-size: 1.5rem;
                margin: 1.5rem 0 0.75rem 0;
                border-bottom: 1px solid #334155;
                padding-bottom: 0.5rem;
            }
            .newsletter-content h2 {
                color: #e2e8f0;
                font-size: 1.25rem;
                margin: 1.25rem 0 0.5rem 0;
            }
            .newsletter-content h3 {
                color: #cbd5e1;
                font-size: 1.1rem;
                margin: 1rem 0 0.5rem 0;
            }
            .newsletter-content p {
                color: #cbd5e1;
                line-height: 1.7;
                margin: 0.5rem 0;
            }
            .newsletter-content a {
                color: #38bdf8;
                text-decoration: none;
            }
            .newsletter-content a:hover {
                text-decoration: underline;
            }
            .newsletter-content ul,
            .newsletter-content ol {
                color: #cbd5e1;
                padding-left: 1.5rem;
                margin: 0.5rem 0;
                line-height: 1.7;
            }
            .newsletter-content li {
                margin-bottom: 0.25rem;
            }
            .newsletter-content hr {
                border: none;
                border-top: 1px solid #334155;
                margin: 1.5rem 0;
            }
            .newsletter-content blockquote {
                border-left: 3px solid #38bdf8;
                margin: 1rem 0;
                padding: 0.5rem 1rem;
                background: rgba(56, 189, 248, 0.05);
                color: #94a3b8;
                font-style: italic;
            }
            .newsletter-content code {
                background: #0f172a;
                color: #a78bfa;
                padding: 0.125rem 0.375rem;
                border-radius: 0.25rem;
                font-size: 0.875rem;
            }
            .newsletter-content pre {
                background: #0f172a;
                color: #cbd5e1;
                padding: 1rem;
                border-radius: 0.375rem;
                overflow-x: auto;
                border: 1px solid #334155;
                margin: 0.75rem 0;
            }
            .newsletter-content pre code {
                background: none;
                padding: 0;
            }
            .newsletter-content table {
                width: 100%;
                border-collapse: collapse;
                margin: 0.75rem 0;
            }
            .newsletter-content table th,
            .newsletter-content table td {
                border: 1px solid #334155;
                padding: 0.5rem;
                text-align: left;
                color: #cbd5e1;
            }
            .newsletter-content table th {
                background: #0f172a;
                color: #94a3b8;
                font-weight: 600;
            }
            .newsletter-content img {
                max-width: 100%;
                border-radius: 0.375rem;
            }
            .newsletter-content strong {
                color: #f1f5f9;
            }
        </style>
        {{ newsletter_html | safe }}
    </div>

    {% else %}
    <div class="card empty-state">
        <p>Newsletter not found for date: {{ newsletter_date }}</p>
    </div>
    {% endif %}
</div>
