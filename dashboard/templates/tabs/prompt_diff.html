<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.56/bundles/css/diff2html.min.css">

<div class="card" x-data="{ outputFormat: 'side-by-side' }">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
        <h2>{{ agent_name }} &mdash; Diff</h2>
        <a style="font-size:0.8125rem;color:#38bdf8;cursor:pointer;text-decoration:none;"
           hx-get="/prompts/{{ agent_name }}" hx-target="#main-content" hx-swap="innerHTML"
           hx-push-url="/prompts/{{ agent_name }}">&larr; Back to history</a>
    </div>

    <div class="meta" style="margin-bottom:1rem;">
        <div class="meta-item">
            <span class="meta-label">From</span><br>
            <span class="meta-value" style="font-family:monospace;font-size:0.75rem;">{{ from_hash }}</span>
        </div>
        <div class="meta-item">
            <span class="meta-label">To</span><br>
            <span class="meta-value" style="font-family:monospace;font-size:0.75rem;">{{ to_hash }}</span>
        </div>
    </div>

    {% if error %}
    <div class="empty-state">
        <p>Could not generate diff. One or both versions were not found.</p>
    </div>
    {% elif no_diff %}
    <div class="empty-state">
        <p>No differences between these versions.</p>
    </div>
    {% else %}
    <div style="margin-bottom:0.75rem;">
        <button @click="outputFormat = 'side-by-side'; $nextTick(() => $dispatch('render-diff', { format: outputFormat }))"
                :style="outputFormat === 'side-by-side' ? 'background:#38bdf8;color:#0f172a;' : 'background:#334155;color:#94a3b8;'"
                style="padding:0.375rem 0.75rem;border:none;border-radius:0.25rem;cursor:pointer;font-size:0.8125rem;margin-right:0.25rem;">
            Side by Side
        </button>
        <button @click="outputFormat = 'line-by-line'; $nextTick(() => $dispatch('render-diff', { format: outputFormat }))"
                :style="outputFormat === 'line-by-line' ? 'background:#38bdf8;color:#0f172a;' : 'background:#334155;color:#94a3b8;'"
                style="padding:0.375rem 0.75rem;border:none;border-radius:0.25rem;cursor:pointer;font-size:0.8125rem;">
            Unified
        </button>
    </div>

    <div id="diff-container" style="border-radius:0.375rem;overflow:hidden;"
         x-on:render-diff.window="renderDiffView($event.detail.format)"></div>

    <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.56/bundles/js/diff2html.min.js"></script>
    <script>
        (function() {
            var rawDiff = {{ diff_text | tojson }};
            var container = document.getElementById('diff-container');

            window.renderDiffView = function(fmt) {
                if (!rawDiff || !container) return;
                container.innerHTML = Diff2Html.html(rawDiff, {
                    drawFileList: false,
                    matching: 'lines',
                    outputFormat: fmt || 'side-by-side'
                });
            };

            function init() {
                if (typeof Diff2Html !== 'undefined') {
                    renderDiffView('side-by-side');
                }
            }

            if (typeof Diff2Html !== 'undefined') {
                init();
            } else {
                var s = document.querySelector('script[src*="diff2html.min.js"]');
                if (s) s.addEventListener('load', init);
            }
        })();
    </script>
    {% endif %}
</div>
