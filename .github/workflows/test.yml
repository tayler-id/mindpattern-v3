name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev zlib1g-dev libffi-dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -x -q --tb=short \
            --ignore=tests/test_cors.py \
            --ignore=tests/test_engagement_linkedin.py \
            --ignore=tests/test_memory_cli.py \
            -k "not test_blocked_when_at_limit and not test_get_model_research_agent"
        env:
          PYTHONPATH: .
