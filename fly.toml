app = "mindpattern"
primary_region = "sjc"

[build]

# One machine runs both the dashboard (mindpattern.ai newsletter viewer,
# inbound HTTP below) and the Socket Mode Slack bot (outbound WebSocket).
# See start.sh.

[env]
  DATA_DIR = "/data"
  USERS_JSON = "/data/users.json"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = 30000
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
    timeout = 5000

[mounts]
  source = "mindpattern_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
